name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install black isort pylint pyright
    - name: Run Black
      run: black --check src/
    - name: Run Isort
      run: isort --check src/
    - name: Run Pyright
      run: pyright src/
    - name: Run Pylint
      run: pylint src/
