name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: lexisearch-linux
            asset_name: lexisearch-linux-amd64
          - os: windows-latest
            artifact_name: lexisearch.exe
            asset_name: lexisearch-windows-amd64.exe
          - os: macos-latest
            artifact_name: lexisearch
            asset_name: lexisearch-macos-amd64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller
      - name: Build with PyInstaller (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --name ${{ matrix.artifact_name }} --onefile --add-data "src/lexisearch/data/dictionary.db:lexisearch/data" src/lexisearch/__main__.py
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --name ${{ matrix.artifact_name }} --onefile --add-data "src/lexisearch/data/dictionary.db;lexisearch/data" src/lexisearch/__main__.py
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
